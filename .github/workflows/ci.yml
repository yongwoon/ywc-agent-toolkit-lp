name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a new push doesn't queue behind a
# stale one (a fresh PR push makes the previous run's result irrelevant).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap, fast-failing gate: no build, no browsers. Surfaces lint/type errors
  # in ~1 min instead of after a full build + Playwright download.
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # The static export is produced once here. `npm run build` runs the full
  # pipeline: prebuild (5-locale message-key parity) -> next build (output:
  # 'export') -> postbuild (sitemap, runtime strip, hash-based CSP injection).
  # The resulting `out/` is uploaded so E2E can reuse it without rebuilding.
  build:
    name: Build & Bundle Budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify bundle budget
        run: npm run verify:bundle

      - name: Upload static export
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out/
          retention-days: 7
          if-no-files-found: error

  # Reuses the artifact from `build` instead of rebuilding. BASE_URL is set so
  # playwright.config.ts skips its own webServer (which would run `npm run
  # build`); we serve `out/` ourselves with the GitHub-Pages-faithful static
  # server and point Playwright at it.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out/

      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E against built artifact
        env:
          BASE_URL: http://localhost:3000
          CI: "true"
        run: |
          node test/e2e-static-server.mjs &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:3000/en/ >/dev/null; then
              echo "static server is up"
              break
            fi
            sleep 1
          done
          npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
